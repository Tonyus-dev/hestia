name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Build Debian Package
        run: npm run build-deb

      - name: Validate systemd unit file
        run: SYSTEMD_UNIT_PATH=packaging/:/lib/systemd/system:/usr/lib/systemd/system:/etc/systemd/system systemd-analyze verify hestia-console.service
