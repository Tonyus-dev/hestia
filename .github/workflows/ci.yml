name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22.13
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check shell syntax
        run: |
          bash -n scripts/doctor.sh
          bash -n scripts/install.sh
          bash -n scripts/install-safety.sh
          bash -n scripts/install.test.sh
          bash -n scripts/uninstall.sh
          bash -n scripts/install-station-agent.sh
          bash -n scripts/install-station-agent.test.sh
          bash -n scripts/uninstall-station-agent.sh
          bash -n scripts/build-deb.sh
          bash -n scripts/build-deb.test.sh
          bash -n packaging/debian/postinst
          bash -n packaging/debian/postinst.test.sh

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Run Station operational smoke
        run: node scripts/station-smoke.mjs

      - name: Run Station installer tests
        run: bash scripts/install-station-agent.test.sh

      - name: Run Console installer tests
        run: bash scripts/install.test.sh

      - name: Run Debian safety tests
        run: |
          bash scripts/build-deb.test.sh
          bash packaging/debian/postinst.test.sh

      - name: Build Debian Package
        run: npm run build-deb

      - name: Validate Console systemd unit file
        run: |
          UNIT_FILE="$(mktemp "$RUNNER_TEMP/hestia-console.XXXXXX.service")"
          sed -e 's#__RUNTIME_DIR__#/opt/hestia-console#g' \
            -e 's#__SERVICE_USER__#hestia-console#g' \
            -e 's#__SERVICE_GROUP__#hestia-console#g' \
            packaging/hestia-console.service.in > "$UNIT_FILE"
          ! grep -Eq '__[A-Z_]+__' "$UNIT_FILE"
          SYSTEMD_UNIT_PATH=packaging/:/lib/systemd/system:/usr/lib/systemd/system:/etc/systemd/system systemd-analyze verify "$UNIT_FILE"

      - name: Render and validate Station Agent systemd unit file
        run: |
          NODE_BIN="$(command -v node)"
          RUNTIME_DIR="/opt/hestia-station"
          SERVICE_USER="$(id -un)"
          SERVICE_GROUP="$(id -gn)"
          UNIT_FILE="$(mktemp "$RUNNER_TEMP/hestia-station-agent.XXXXXX.service")"
          sed -e "s#__NODE_BIN__#$NODE_BIN#g" \
            -e "s#__RUNTIME_DIR__#$RUNTIME_DIR#g" \
            -e "s#__SERVICE_USER__#$SERVICE_USER#g" \
            -e "s#__SERVICE_GROUP__#$SERVICE_GROUP#g" \
            packaging/hestia-station-agent.service.in > "$UNIT_FILE"
          ! grep -Eq '__[A-Z_]+__' "$UNIT_FILE"
          grep -Fqx "WorkingDirectory=$RUNTIME_DIR" "$UNIT_FILE"
          grep -Fqx "ExecStart=$NODE_BIN $RUNTIME_DIR/station.js" "$UNIT_FILE"
          grep -Eq '^User=.+$' "$UNIT_FILE"
          grep -Eq '^Group=.+$' "$UNIT_FILE"
          SYSTEMD_UNIT_PATH=packaging/:/lib/systemd/system:/usr/lib/systemd/system:/etc/systemd/system systemd-analyze verify "$UNIT_FILE"
